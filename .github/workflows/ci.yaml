name: Clang-Tidy (OpenMandriva)

on:
  push:
  pull_request:

jobs:
  clang-tidy:
    runs-on: ubuntu-latest

    container:
      image: openmandriva/cooker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y \
            task-c-devel \
            clang \
            clang-tools \
            llvm \
            lld \
            meson \
            ninja \
            pkgconfig \
            x11-proto-devel \
            x11-xtrans-devel \
            lib64nettle-devel \
            lib64x11-devel \
            lib64xext-devel \
            lib64xfixes-devel \
            lib64xdamage-devel \
            lib64xrender-devel \
            lib64xrandr-devel \
            lib64xkbfile-devel \
            lib64xfont2-devel \
            lib64pixman-devel \
            lib64xshmfence-devel \
            lib64epoxy-devel

      - name: Configure with Meson
        run: |
          # Use CC/CXX env vars to force Clang, otherwise it might look for GCC
          export CC=clang
          export CXX=clang++
          meson setup builddir --buildtype=debug

      - name: Run clang-tidy
        run: |
          # run-clang-tidy finds the compile_commands.json in builddir/
          # -export-fixes is required if you want the YAML output for the upload step
          run-clang-tidy -p builddir -header-filter='.*' -export-fixes=clang-tidy-fixes.yaml || true

      - name: Upload clang-tidy results
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-report
          path: clang-tidy-fixes.yaml
