name: Clang-Tidy (OpenMandriva)

on:
  push:
  pull_request:

jobs:
  clang-tidy:
    runs-on: ubuntu-latest

    container:
      image: openmandriva/cooker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          # 1. Update and protect the core system to prevent 'bash' removal
          dnf --refresh -y --setopt=protected_packages=bash,glibc,dnf upgrade
          
          # 2. Install the full toolchain and identified X11/legacy headers
          dnf install -y \
            task-c-devel \
            clang \
            clang-tools \
            llvm \
            lld \
            meson \
            ninja \
            pkgconfig \
            bison \
            flex \
            python3-mako \
            xkbcomp \
            xkbcomp-devel \
            x11-font-util \
            lib64udev-devel \
            'pkgconfig(xproto)' \
            'pkgconfig(xtrans)' \
            'pkgconfig(xkbfile)' \
            'pkgconfig(xfont2)' \
            'pkgconfig(nettle)' \
            'pkgconfig(libbsd)' \
            'pkgconfig(dbus-1)' \
            'pkgconfig(xkbcommon)' \
            'pkgconfig(pixman-1)' \
            'pkgconfig(epoxy)' \
            'pkgconfig(pciaccess)' \
            'pkgconfig(libdrm)' \
            'pkgconfig(xshmfence)'
            
      - name: Create .clang-tidy configuration
        run: |
          cat <<EOF > .clang-tidy
          ---
          Checks: >
            -*,
            bugprone-*,
            clang-analyzer-*,
            performance-*,
            portability-*,
            -bugprone-reserved-identifier,
            -bugprone-exception-escape,
            readability-braces-around-statements,
            readability-redundant-address-of,
            readability-redundant-control-flow
          WarningsAsErrors: 'bugprone-*,clang-analyzer-core.*'
          CheckOptions:
            - key:             bugprone-sizeof-expression.WarnOnSizeOfIntegerExpression
              value:           'true'
          ...
          EOF

      - name: Configure with Meson
        run: |
          # Explicitly set the compiler to the one we just installed
          export CC=clang
          export CXX=clang++
          rm -rf builddir
          meson setup builddir --buildtype=debug

      - name: Run clang-tidy
        run: |
          # -p builddir points to the compile_commands.json generated by Meson
          run-clang-tidy -p builddir -header-filter='.*' -export-fixes=clang-tidy-fixes.yaml || true

      - name: Upload clang-tidy results
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-report
          path: clang-tidy-fixes.yaml
