name: Clang-Tidy (OpenMandriva)

on:
  push:
  pull_request:

jobs:
  clang-tidy:
    runs-on: ubuntu-latest

    container:
      image: openmandriva/cooker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf clean all
          dnf --refresh -y upgrade --best --allowerasing
          
          dnf install -y \
            task-c-devel \
            clang \
            clang-tools \
            llvm \
            lld \
            meson \
            ninja \
            pkgconfig \
            bison \
            flex \
            python3-mako \
            x11-proto-devel \
            x11-xtrans-devel \
            x11-util-macros \
            xkbcomp \
            lib64xkbcomp-devel \
            lib64bsd-devel \
            lib64dbus-devel \
            lib64nettle-devel \
            lib64pixman-devel \
            lib64x11-devel \
            lib64xcb-devel \
            lib64xext-devel \
            lib64xfixes-devel \
            lib64xdamage-devel \
            lib64xrender-devel \
            lib64xrandr-devel \
            lib64xkbfile-devel \
            lib64xkbcommon-devel \
            lib64xfont2-devel \
            lib64xshmfence-devel \
            lib64epoxy-devel \
            lib64pciaccess-devel \
            lib64drm-devel \
            lib64udev-devel

      - name: Create .clang-tidy configuration
        run: |
          cat <<EOF > .clang-tidy
          ---
          Checks: >
            -*,
            bugprone-*,
            clang-analyzer-*,
            performance-*,
            portability-*,
            -bugprone-reserved-identifier,
            -bugprone-exception-escape,
            readability-braces-around-statements,
            readability-redundant-address-of,
            readability-redundant-control-flow
          WarningsAsErrors: 'bugprone-*,clang-analyzer-core.*'
          CheckOptions:
            - key:             bugprone-sizeof-expression.WarnOnSizeOfIntegerExpression
              value:           'true'
          ...
          EOF

      - name: Configure with Meson
        run: |
          # Explicitly set the compiler to the one we just installed
          export CC=clang
          export CXX=clang++
          rm -rf builddir
          meson setup builddir --buildtype=debug

      - name: Run clang-tidy
        run: |
          # -p builddir points to the compile_commands.json generated by Meson
          run-clang-tidy -p builddir -header-filter='.*' -export-fixes=clang-tidy-fixes.yaml || true

      - name: Upload clang-tidy results
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-report
          path: clang-tidy-fixes.yaml
