name: Clang-Tidy (OpenMandriva)

on:
  push:
  pull_request:

jobs:
  clang-tidy:
    runs-on: ubuntu-latest

    container:
      image: openmandriva/cooker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y \
            clang \
            clang-tools \
            meson \
            ninja \
            pkgconfig \
            xorgproto \
            libx11-devel \
            libxext-devel \
            libxfixes-devel \
            libxdamage-devel \
            libxrender-devel \
            libxrandr-devel \
            libxkbfile-devel

      - name: Configure with Meson
        run: |
          meson setup builddir --buildtype=debug --wipe
          ln -sf builddir/compile_commands.json .

      - name: Run clang-tidy
        run: |
          clang-tidy $(find . -name "*.c") --export-fixes=clang-tidy-fixes.yaml || true

      - name: Upload clang-tidy results
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-report
          path: clang-tidy-fixes.yaml
