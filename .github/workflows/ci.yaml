name: Clang-Tidy

on:
  push:
  pull_request:

jobs:
  clang-tidy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy meson ninja-build

      - name: Configure with Meson
        run: |
          meson setup builddir --buildtype=debug -Dcpp_args="-Wall" --wipe
          # Meson automatically generates compile_commands.json
          ln -sf builddir/compile_commands.json .

      - name: Run clang-tidy
        run: |
          clang-tidy $(find . -name "*.cpp") --export-fixes=clang-tidy-fixes.yaml || true

      - name: Upload clang-tidy results
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-report
          path: clang-tidy-fixes.yaml
