name: Clang-Tidy (OpenMandriva)
on:
  push:
  pull_request:

jobs:
  clang-tidy:
    runs-on: ubuntu-latest
    container:
      image: openmandriva/cooker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          # 1. Update and protect the core system
          dnf --refresh -y --setopt=protected_packages=bash,glibc,dnf upgrade
          
          # 2. Install toolchain + X11 headers + mandatory auth libs
          dnf install -y \
            task-c-devel clang clang-tools llvm lld meson ninja pkgconfig bison flex python3-mako \
            xkbcomp xkbcomp-devel x11-font-util lib64udev-devel \
            lib64xau-devel lib64xdmcp-devel \
            'pkgconfig(xproto)' 'pkgconfig(xtrans)' 'pkgconfig(xkbfile)' \
            'pkgconfig(xfont2)' 'pkgconfig(nettle)' 'pkgconfig(libbsd)' \
            'pkgconfig(dbus-1)' 'pkgconfig(xkbcommon)' 'pkgconfig(pixman-1)' \
            'pkgconfig(epoxy)' 'pkgconfig(pciaccess)' 'pkgconfig(libdrm)' \
            'pkgconfig(xshmfence)'

      - name: Create .clang-tidy configuration
        run: |
          cat <<EOF > .clang-tidy
          ---
          Checks: >
            -*,
            bugprone-*,
            clang-analyzer-*,
            performance-*,
            portability-*,
            -bugprone-reserved-identifier,
            -bugprone-exception-escape,
            readability-braces-around-statements,
            readability-redundant-address-of,
            readability-redundant-control-flow
          WarningsAsErrors: 'bugprone-*,clang-analyzer-core.*'
          ...
          EOF

      - name: Configure with Meson
        run: |
          export CC=clang
          export CXX=clang++
          rm -rf builddir
          # Applying the "Lean Build" flags to ignore Apple/Windows bitrot
          meson setup builddir --buildtype=debug \
            -Dapplewm=false \
            -Dxwin=false \
            -Dxnest=false \
            -Ddri3=true \
            -Dglamor=true || (cat builddir/meson-logs/meson-log.txt && exit 1)

      - name: Run clang-tidy
        run: |
          # The -p builddir uses the compile_commands.json Meson just made
          run-clang-tidy -p builddir -header-filter='.*' -export-fixes=clang-tidy-fixes.yaml || true

      - name: Upload clang-tidy results
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-report
          path: clang-tidy-fixes.yaml
