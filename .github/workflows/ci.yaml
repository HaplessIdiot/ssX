name: Clang-Tidy (OpenMandriva)

on:
  push:
  pull_request:

jobs:
  clang-tidy:
    runs-on: ubuntu-latest

    container:
      image: openmandriva/cooker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y \
            clang \
            clang-tools \
            meson \
            ninja \
            pkgconfig \
            x11-proto-devel \
            lib64x11-devel \
            lib64xext-devel \
            lib64xfixes-devel \
            lib64xdamage-devel \
            lib64xrender-devel \
            lib64xrandr-devel \
            lib64xkbfile-devel

      - name: Configure with Meson
        run: |
          # Ensure the build directory is generated
          meson setup builddir --buildtype=debug

      - name: Run clang-tidy
        run: |
          # -p points to the directory containing compile_commands.json
          # We use a glob for the source files
          run-clang-tidy -p builddir -fix -format -header-filter=.* || true

      - name: Upload clang-tidy results
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-report
          path: clang-tidy-fixes.yaml
