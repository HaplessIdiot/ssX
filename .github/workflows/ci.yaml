name: Clang-Tidy (OpenMandriva)

on:
  push:
  pull_request:

jobs:
  clang-tidy:
    runs-on: ubuntu-latest

    container:
      image: openmandriva/cooker

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y \
            clang \
            clang-tools \
            meson \
            ninja \
            pkgconfig \
            xorgproto \
            libx11-devel \
            libxext-devel \
            libxfixes-devel \
            libxdamage-devel \
            libxrender-devel \
            libxrandr-devel \
            libxkbfile-devel

      - name: Configure with Meson
        run: |
          meson setup builddir --buildtype=debug --wipe
          ln -sf builddir/compile_commands.json .

      - name: Run clang
